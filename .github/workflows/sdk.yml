# Сборка SDK. Секреты (SIGNING_KEY, SIGNING_PASSWORD) используются только в job verify-signing
# при ручном запуске workflow_dispatch — см. docs/PUBLISHING_MAVEN_CENTRAL.md §5.
name: SDK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Assemble release AAR
        run: gradle :closed-test-sdk:assembleRelease --no-daemon

      - name: Assemble sample debug
        run: gradle :examples:sample:assembleDebug --no-daemon

  verify-signing:
    name: Verify GPG signing (publishToMavenLocal)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Publish to Maven Local
        env:
          ORG_GRADLE_PROJECT_signing.key: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
        run: gradle :closed-test-sdk:publishToMavenLocal --no-daemon

      - name: List signed artifacts (expect .asc)
        run: |
          set -e
          VER=$(grep 'closedTestSdk' gradle/libs.versions.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          ls -la "$HOME/.m2/repository/com/groundspaceteam/closed-test-sdk/$VER/" || true
          find "$HOME/.m2/repository/com/groundspaceteam/closed-test-sdk" -name '*.asc' 2>/dev/null | head -20
