# Сборка SDK (push/PR). Проверка GPG — отдельный workflow «Verify GPG signing».
name: SDK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4
        with:
          gradle-version: "8.10.2"

      - name: Assemble release AAR
        run: |
          gradle :closed-test-sdk:assembleRelease --no-daemon
          gradle :closed-test-sdk-navigation-compose:assembleRelease --no-daemon

      - name: Assemble sample debug
        run: gradle :examples:sample:assembleDebug --no-daemon
