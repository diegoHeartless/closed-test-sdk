# Сборка SDK (push/PR). Проверка GPG — отдельный workflow «Verify GPG signing».
name: SDK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Assemble release AAR
        run: gradle :closed-test-sdk:assembleRelease --no-daemon

      - name: Assemble sample debug
        run: gradle :examples:sample:assembleDebug --no-daemon
