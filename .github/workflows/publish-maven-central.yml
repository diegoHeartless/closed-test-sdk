# Ручной деплой в Sonatype Central Publisher Portal (JReleaser).
# Нужны секреты: MAVEN_CENTRAL_USERNAME, MAVEN_CENTRAL_PASSWORD (User Token),
# SIGNING_KEY (armored private key), SIGNING_PASSWORD (passphrase) — для JReleaser (JRELEASER_GPG_*).
name: Publish to Maven Central (Portal)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "JReleaser dry run (no upload)"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Stage, sign, deploy (JReleaser → Central Portal)
        env:
          # Unsigned staging; JReleaser signs every file for Sonatype (incl. checksum .asc if required).
          ORG_GRADLE_PROJECT_skipMavenSigning: "true"
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.SIGNING_KEY }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.SIGNING_PASSWORD }}
          JRELEASER_MAVENCENTRAL_SONATYPE_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_SONATYPE_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            gradle jreleaserDeploy --no-daemon --stacktrace --dryrun
          else
            gradle jreleaserDeploy --no-daemon --stacktrace
          fi
