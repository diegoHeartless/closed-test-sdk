# Только ручной запуск: Actions → «Verify GPG signing» → Run workflow.
# Не зависит от push/PR: при Re-run старого push-события job с workflow_dispatch не выполнится.
name: Verify GPG signing

on:
  workflow_dispatch:

jobs:
  verify-signing:
    name: publishToMavenLocal + .asc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Publish to Maven Local
        env:
          ORG_GRADLE_PROJECT_signing.key: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signing.password: ${{ secrets.SIGNING_PASSWORD }}
        run: gradle :closed-test-sdk:publishToMavenLocal --no-daemon

      - name: List signed artifacts (expect .asc)
        run: |
          set -e
          VER=$(grep 'closedTestSdk' gradle/libs.versions.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          ls -la "$HOME/.m2/repository/com/groundspaceteam/closed-test-sdk/$VER/" || true
          find "$HOME/.m2/repository/com/groundspaceteam/closed-test-sdk" -name '*.asc' 2>/dev/null | head -20
