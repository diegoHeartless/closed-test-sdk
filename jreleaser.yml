# JReleaser: upload staged Maven layout to Sonatype Central Publisher Portal.
# Stage first: ./gradlew :closed-test-sdk:publishReleasePublicationToStagingRepository
# (CI: skip Gradle signing — ORG_GRADLE_PROJECT_skipMavenSigning=true — then JReleaser signs via JRELEASER_GPG_*.)
# Then:      ./gradlew jreleaserDeploy
# Or one shot: ./gradlew jreleaserDeploy  (root wires deploy → staging publish)

project:
  name: closed-test-sdk
  description: Closed testing proof / usage SDK for Android (ingest client).
  languages:
    java:
      groupId: com.groundspaceteam
      artifactId: closed-test-sdk

# Sign staged files here: Sonatype validates .asc for every published file (Gradle often skips *.module).
signing:
  pgp:
    active: ALWAYS
    armored: true
    verify: false

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: RELEASE
        url: https://central.sonatype.com/api/v1/publisher
        applyMavenCentralRules: true
        # PomChecker uses stock Maven and fails on <packaging>aar</packaging> (“Unknown packaging: aar”).
        # The POM is still valid for Central; Sonatype accepts AAR coordinates.
        verifyPom: false
        sign: true
        namespace: com.groundspaceteam
        stagingRepositories:
          - closed-test-sdk/build/staging-deploy
        artifactOverrides:
          - groupId: com.groundspaceteam
            artifactId: closed-test-sdk
            jar: false
            verifyPom: false
